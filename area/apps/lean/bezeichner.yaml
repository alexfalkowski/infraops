environment: production
generator:
  applications:
    - name: uuid
      kind: uuid
    - name: ksuid
      kind: ksuid
    - name: ulid
      kind: ulid
    - name: snowflake
      kind: snowflake
    - name: xid
      kind: xid
    - name: nanoid
      kind: nanoid
    - name: typeid
      kind: typeid
health:
  duration: 1s
  timeout: 1s
id:
  kind: ksuid
telemetry:
  logger:
    kind: text
    level: info
transport:
  http:
    limiter:
      kind: user-agent
      tokens: 1000
      interval: 1s
    timeout: 5s
  grpc:
    limiter:
      kind: user-agent
      tokens: 1000
      interval: 1s
    timeout: 5s
